<div class="page-container">
  <div class="page-header">
    <h2>{{ esEdicion ? 'Editar Usuario' : 'Nuevo Usuario' }}</h2>
    <a routerLink="/usuarios" class="btn btn-secondary">Cancelar</a>
  </div>

  @if (error) { <div class="alert alert-error">{{ error }}</div> }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" formControlName="nombre" />
      </div>
      <div class="form-group">
        <label>Apellido *</label>
        <input type="text" formControlName="apellido" />
      </div>
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" formControlName="email" />
    </div>

    <div class="form-group">
      <label>Contraseña {{ esEdicion ? '(dejar vacío para no cambiar)' : '*' }}</label>
      <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Rol *</label>
        <select formControlName="rol">
          @for (r of roles; track r) { <option [value]="r">{{ r }}</option> }
        </select>
      </div>
      <div class="form-group form-group--checkbox">
        <label>
          <input type="checkbox" formControlName="activo" />
          Usuario Activo
        </label>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || guardando">
        {{ guardando ? 'Guardando...' : (esEdicion ? 'Actualizar' : 'Crear Usuario') }}
      </button>
    </div>
  </form>
</div>
