<div class="page-container">
  <div class="page-header">
    <h2>{{ esEdicion ? 'Editar Caso de Prueba' : 'Nuevo Caso de Prueba' }}</h2>
    <div class="header-actions">
      <a routerLink="/casos-prueba/importar" class="btn btn-secondary">Importar Excel</a>
      <a routerLink="/casos-prueba" class="btn btn-secondary">Cancelar</a>
    </div>
  </div>

  @if (error) { <div class="alert alert-error">{{ error }}</div> }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- Identificación -->
    <div class="form-section">
      <h3 class="form-section-title">Identificación</h3>
      <div class="form-row">
        <div class="form-group form-group--sm">
          <label for="codigo">Código CP</label>
          <input id="codigo" type="text" formControlName="codigo" placeholder="CP-001" />
        </div>
        <div class="form-group">
          <label for="nombre">Nombre del Caso de Prueba *</label>
          <input id="nombre" type="text" formControlName="nombre"
            placeholder="Descripción breve del caso" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="proyectoId">Proyecto *</label>
          <select id="proyectoId" formControlName="proyectoId">
            <option [value]="null">Seleccionar proyecto...</option>
            @for (p of proyectos; track p.id) {
              <option [value]="p.id">{{ p.codigo }} — {{ p.nombre }}</option>
            }
          </select>
        </div>
        <div class="form-group form-group--sm">
          <label for="claveProyecto">Clave Proyecto</label>
          <input id="claveProyecto" type="text" formControlName="claveProyecto" readonly
            class="input-readonly" placeholder="Auto" />
        </div>
        <div class="form-group form-group--sm">
          <label for="requerimientoRf">Requerimiento RF</label>
          <input id="requerimientoRf" type="text" formControlName="requerimientoRf" placeholder="RF-001" />
        </div>
      </div>
    </div>

    <!-- Tipo y Descripción -->
    <div class="form-section">
      <h3 class="form-section-title">Tipo y Descripción</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="tipo">Tipo de Prueba *</label>
          <select id="tipo" formControlName="tipo">
            @for (t of tipos; track t) { <option [value]="t">{{ t }}</option> }
          </select>
        </div>
        <div class="form-group">
          <label for="prioridad">Prioridad *</label>
          <select id="prioridad" formControlName="prioridad">
            @for (p of prioridades; track p) { <option [value]="p">{{ p }}</option> }
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="descripcion">Descripción del Caso de Prueba *</label>
        <textarea id="descripcion" formControlName="descripcion" rows="3"
          placeholder="Qué se va a probar y cuál es el objetivo del caso..."></textarea>
      </div>
    </div>

    <!-- Pasos y Resultado -->
    <div class="form-section">
      <h3 class="form-section-title">Pasos de Prueba</h3>
      <div class="form-group">
        <label for="pasos">Pasos de Prueba *</label>
        <textarea id="pasos" formControlName="pasos" rows="6"
          placeholder="1. Navegar a la página de inicio&#10;2. Hacer clic en el botón Iniciar Sesión&#10;3. Ingresar usuario y contraseña&#10;4. Hacer clic en Aceptar"></textarea>
        <span class="field-hint">Ingrese cada paso en una línea separada, numerados (1. 2. 3. ...)</span>
      </div>
      <div class="form-group">
        <label for="resultadoEsperado">Resultado Esperado *</label>
        <textarea id="resultadoEsperado" formControlName="resultadoEsperado" rows="3"
          placeholder="El sistema debe..."></textarea>
      </div>
    </div>

    <!-- Estado y Ejecución -->
    <div class="form-section">
      <h3 class="form-section-title">Estado y Ejecución</h3>
      <div class="form-row form-row--3">
        <div class="form-group">
          <label for="estado">Estado QA *</label>
          <select id="estado" formControlName="estado">
            @for (e of estadosQA; track e) { <option [value]="e">{{ e }}</option> }
          </select>
        </div>
        <div class="form-group">
          <label for="resultado">Resultado</label>
          <select id="resultado" formControlName="resultado">
            @for (r of resultados; track r) { <option [value]="r">{{ r }}</option> }
          </select>
        </div>
        <div class="form-group">
          <label for="fechaEjecucion">Fecha Ejecución</label>
          <input id="fechaEjecucion" type="date" formControlName="fechaEjecucion" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="responsableQaId">Responsable QA</label>
          <select id="responsableQaId" formControlName="responsableQaId">
            <option [value]="null">Sin asignar</option>
            @for (u of usuarios; track u.id) {
              <option [value]="u.id">{{ u.nombre }} {{ u.apellido }}</option>
            }
          </select>
        </div>
        <div class="form-group">
          <label for="evidenciaUrl">Evidencia (URL)</label>
          <input id="evidenciaUrl" type="text" formControlName="evidenciaUrl"
            placeholder="https://... (captura, video, reporte)" />
        </div>
      </div>
      <div class="form-group">
        <label for="observaciones">Observaciones</label>
        <textarea id="observaciones" formControlName="observaciones" rows="3"
          placeholder="Notas adicionales sobre la ejecución, bloqueos, etc."></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || guardando">
        {{ guardando ? 'Guardando...' : (esEdicion ? 'Actualizar' : 'Crear Caso de Prueba') }}
      </button>
      <a routerLink="/casos-prueba" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
