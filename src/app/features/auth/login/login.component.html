<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Sistema QA <span>DLWLatam</span></h1>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      @if (error) {
        <div class="alert alert-error">{{ error }}</div>
      }

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" formControlName="email" placeholder="usuario@empresa.com" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="field-error">Ingresa un correo válido</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="field-error">Mínimo 6 caracteres</span>
        }
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="cargando">
        {{ cargando ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>
    </form>
  </div>
</div>
